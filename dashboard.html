<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureCam — ダッシュボード</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SecureCam">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#00d4ff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10; --surface: #0d1117; --surface2: #111820; --border: #1a2332;
    --accent: #00d4ff; --accent2: #ff4455; --accent3: #00ff88;
    --text: #c8dae8; --muted: #3a5068;
    --font-mono: 'Share Tech Mono', monospace; --font-ui: 'Zen Kaku Gothic New', sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-ui); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* ヘッダー */
  header {
    display:flex; align-items:center; gap:16px; padding:8px 16px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; position:relative;
  }
  header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.4; }
  .logo { font-family:var(--font-mono); font-size:14px; color:var(--accent); letter-spacing:3px; display:flex; align-items:center; gap:10px; }
  .ver-badge {
    display:inline-block; padding:2px 8px; font-size:10px; color:var(--accent);
    background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); border-radius:3px;
    letter-spacing:1px; cursor:pointer; transition:all 0.2s;
  }
  .ver-badge:hover { background:rgba(0,212,255,0.25); box-shadow:0 0 8px rgba(0,212,255,0.4); }
  .header-stats { display:flex; gap:20px; margin-left:auto; align-items:center; }
  .stat { font-family:var(--font-mono); font-size:10px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .stat .val { color:var(--text); font-size:13px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--accent3); animation:pulse 2s ease-in-out infinite; }
  .dot.alert { background:var(--accent2); animation-duration:0.5s; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #clock { font-family:var(--font-mono); font-size:13px; color:var(--accent); letter-spacing:1px; }
  .btn-logout {
    font-family:var(--font-mono); font-size:11px; font-weight:500; letter-spacing:2px;
    color:#fff; background:rgba(255,68,85,0.8); border:1.5px solid var(--accent2);
    padding:7px 14px; cursor:pointer; transition:all 0.2s; border-radius:4px;
  }
  .btn-logout:hover { background:var(--accent2); box-shadow:0 0 12px rgba(255,68,85,0.5); }

  /* メイン */
  .main { display:flex; flex:1; overflow:hidden; }

  /* カメラグリッド */
  #camera-grid { flex:1; display:grid; gap:2px; padding:2px; background:#000; overflow:hidden; grid-template-columns:1fr; grid-template-rows:1fr; }
  #camera-grid.grid-1 { grid-template-columns:1fr; grid-template-rows:1fr; }
  #camera-grid.grid-2 { grid-template-columns:repeat(2,1fr); grid-template-rows:1fr; }
  #camera-grid.grid-3, #camera-grid.grid-4 { grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); }
  #camera-grid.grid-5, #camera-grid.grid-6 { grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); }

  .camera-cell { position:relative; background:#000; overflow:hidden; border:1px solid var(--border); transition:border-color 0.2s; }
  .camera-cell:hover { border-color:var(--accent); }
  .camera-cell.motion-alert { border-color:var(--accent2); animation:flash 0.5s ease-in-out infinite; }
  @keyframes flash { 0%,100%{border-color:var(--accent2)} 50%{border-color:transparent} }
  .camera-cell video { width:100%; height:100%; object-fit:cover; display:block; }
  .cam-label { position:absolute; top:8px; left:8px; font-family:var(--font-mono); font-size:10px; color:#fff; background:rgba(0,0,0,0.75); padding:3px 8px; border-left:2px solid var(--accent); letter-spacing:1px; }
  .cam-live { position:absolute; top:8px; right:8px; width:8px; height:8px; border-radius:50%; background:var(--accent3); animation:pulse 2s ease-in-out infinite; }
  .cam-live.connecting { background:#ffaa00; }
  .cam-live.offline { background:var(--muted); animation:none; }
  .cam-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.85)); padding:20px 10px 8px; display:flex; align-items:flex-end; gap:8px; }
  .motion-badge { font-family:var(--font-mono); font-size:9px; color:var(--accent2); border:1px solid var(--accent2); padding:2px 6px; background:rgba(255,68,85,0.15); display:none; animation:pulse 0.5s ease-in-out infinite; }
  .motion-badge.show { display:block; }
  .cam-time { font-family:var(--font-mono); font-size:9px; color:rgba(255,255,255,0.5); margin-left:auto; }

  /* 空状態 */
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--muted); grid-column:1/-1; grid-row:1/-1; }
  .empty-icon { font-size:40px; opacity:0.3; }
  .empty-state h2 { font-family:var(--font-mono); font-size:13px; color:var(--accent); letter-spacing:2px; }
  .empty-state p { font-size:12px; text-align:center; line-height:1.7; }
  .url-box { font-family:var(--font-mono); font-size:12px; color:var(--accent); background:var(--surface); border:1px solid var(--border); padding:10px 16px; cursor:pointer; transition:border-color 0.2s; word-break:break-all; text-align:center; max-width:360px; }
  .url-box:hover { border-color:var(--accent); }
  .copy-hint { font-family:var(--font-mono); font-size:10px; color:var(--muted); margin-top:4px; }

  /* サイドバー */
  .sidebar { width:220px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
  .sidebar-label { font-family:var(--font-mono); font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; padding:10px 12px 6px; border-bottom:1px solid var(--border); }
  #camera-list { padding:6px; border-bottom:1px solid var(--border); }
  .cam-list-item { display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:11px; cursor:pointer; border-radius:2px; transition:background 0.15s; }
  .cam-list-item:hover { background:var(--surface2); }
  .cam-list-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .cam-list-name { font-family:var(--font-mono); font-size:10px; color:var(--text); flex:1; }
  #alert-log { flex:1; overflow-y:auto; padding:6px; }
  #alert-log::-webkit-scrollbar { width:3px; }
  #alert-log::-webkit-scrollbar-thumb { background:var(--border); }
  .alert-item { padding:8px 10px; margin-bottom:4px; background:var(--surface2); border-left:2px solid var(--accent2); animation:slide-in 0.2s ease-out; }
  @keyframes slide-in { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }
  .alert-cam { font-family:var(--font-mono); font-size:10px; color:var(--accent2); }
  .alert-time { font-family:var(--font-mono); font-size:9px; color:var(--muted); margin-top:2px; }
  .no-alert { font-family:var(--font-mono); font-size:10px; color:var(--muted); padding:10px; text-align:center; }
  .controls { padding:8px; border-top:1px solid var(--border); display:flex; gap:5px; flex-wrap:wrap; }
  .ctrl-btn { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:5px 8px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; transition:all 0.15s; flex:1; }
  .ctrl-btn:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">SECURE<span style="color:var(--muted)">///</span>CAM <span class="ver-badge" onclick="window.open('index.html','_blank')">v1.1.1</span></div>
  <div class="header-stats">
    <div class="stat"><div class="dot" id="live-dot"></div>LIVE <span class="val" id="cam-count">0</span></div>
    <div class="stat">ALERT <span class="val" id="alert-count">0</span></div>
    <div id="clock"></div>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
  </div>
</header>

<div class="main">
  <div id="camera-grid">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📡</div>
      <h2>カメラ待機中</h2>
      <p>以下のURLをカメラ端末のブラウザで開いてください</p>
      <div class="url-box" id="camera-url" onclick="copyUrl()">---</div>
      <div class="copy-hint">タップでURLをコピー</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-label">// カメラ一覧</div>
    <div id="camera-list"><div class="no-alert">接続なし</div></div>
    <div class="sidebar-label">// 動体検知ログ</div>
    <div id="alert-log"><div class="no-alert">アラートなし</div></div>
    <div class="controls">
      <button class="ctrl-btn" onclick="clearAlerts()">CLR LOG</button>
      <button class="ctrl-btn" id="sound-btn" onclick="toggleSound()">🔔 ON</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db = firebase.database();

  const cameras = new Map();
  let alertCount = 0;
  let soundEnabled = true;
  let myId = null;

  // 認証
  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'index.html'; return; }
    myId = user.uid;
    initDashboard();
  });

  // 時刻
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('ja-JP') + ' ' + now.toTimeString().slice(0,8);
  }
  setInterval(updateClock, 1000);
  updateClock();

  // カメラURL表示
  function showCameraUrl() {
    const doShow = () => {
      const el = document.getElementById('camera-url');
      if (!el) return;
      const url = location.origin + location.pathname.replace('dashboard.html', 'camera.html');
      el.textContent = url;
      el.dataset.url = url;
    };
    doShow();
    setTimeout(doShow, 500);
    setTimeout(doShow, 1500);
  }

  function copyUrl() {
    const el = document.getElementById('camera-url');
    const url = el?.dataset?.url;
    if (!url) return;
    navigator.clipboard.writeText(url).then(() => {
      const orig = el.textContent;
      el.textContent = '✓ コピーしました';
      setTimeout(() => { el.textContent = orig; }, 2000);
    });
  }

  // ダッシュボード初期化
  function initDashboard() {
    showCameraUrl();

    // Firebaseに自分を登録
    const dashRef = db.ref('dashboard/' + myId);
    dashRef.set({ online: true, joinedAt: Date.now() });
    dashRef.onDisconnect().remove();

    // カメラの接続を監視 — dashboardIdに関係なく全カメラを受け入れる
    db.ref('cameras').on('child_added', snap => {
      const cam = snap.val();
      if (cam) {
        addCamera(snap.key, cam);
      }
    });

    db.ref('cameras').on('child_removed', snap => {
      removeCamera(snap.key);
    });

    // シグナリング受信（カメラからのoffer・ICE candidate）
    db.ref('signaling/' + myId).on('child_added', snap => {
      const msg = snap.val();
      if (!msg) return;
      snap.ref.remove();
      handleSignaling(msg);
    });

    // アラート監視
    db.ref('alerts/' + myId).limitToLast(50).on('child_added', snap => {
      const alert = snap.val();
      if (alert) addAlertItem(alert);
    });
  }

  // カメラ追加
  async function addCamera(cameraId, camInfo) {
    if (cameras.has(cameraId)) return;

    const pc = new RTCPeerConnection({
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    });

    const cam = { pc, name: camInfo.name || 'Camera ' + cameraId.slice(0,6), stream: null, cell: null };
    cameras.set(cameraId, cam);

    pc.ontrack = e => {
      cam.stream = e.streams[0];
      if (cam.cell) {
        cam.cell.querySelector('video').srcObject = e.streams[0];
        cam.cell.querySelector('.cam-live').className = 'cam-live';
      }
    };

    pc.onicecandidate = e => {
      if (e.candidate) {
        db.ref('signaling/' + cameraId).push({
          type: 'ice-candidate',
          candidate: e.candidate.toJSON(),
          dashboardId: myId,
          from: 'dashboard'
        });
      }
    };

    pc.onconnectionstatechange = () => {
      const dot = cam.cell?.querySelector('.cam-live');
      if (!dot) return;
      if (pc.connectionState === 'connected') dot.className = 'cam-live';
      else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') dot.className = 'cam-live offline';
    };

    createCameraCell(cameraId, cam);
    updateCameraList();
    updateGrid();
  }

  // シグナリング処理
  async function handleSignaling(msg) {
    if (!msg.cameraId) return;
    const cam = cameras.get(msg.cameraId);
    if (!cam) return;

    if (msg.type === 'offer') {
      try {
        await cam.pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: msg.sdp }));
        const answer = await cam.pc.createAnswer();
        await cam.pc.setLocalDescription(answer);
        db.ref('signaling/' + msg.cameraId).push({
          type: 'answer',
          sdp: answer.sdp,
          dashboardId: myId,
          from: 'dashboard'
        });
      } catch(e) { console.error('Offer handling error:', e); }
    } else if (msg.type === 'ice-candidate' && msg.candidate) {
      try { await cam.pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch(e) {}
    }
  }

  // カメラセル作成
  function createCameraCell(cameraId, cam) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const cell = document.createElement('div');
    cell.className = 'camera-cell';
    cell.id = 'cell-' + cameraId;
    cell.innerHTML = '<video autoplay playsinline muted></video>' +
      '<div class="cam-label">' + cam.name + '</div>' +
      '<div class="cam-live connecting"></div>' +
      '<div class="cam-overlay"><div class="motion-badge" id="motion-' + cameraId + '">▲ MOTION</div>' +
      '<div class="cam-time" id="camtime-' + cameraId + '"></div></div>';
    document.getElementById('camera-grid').appendChild(cell);
    cam.cell = cell;

    setInterval(() => {
      const el = document.getElementById('camtime-' + cameraId);
      if (el) el.textContent = new Date().toTimeString().slice(0,8);
    }, 1000);
  }

  // カメラ削除
  function removeCamera(cameraId) {
    const cam = cameras.get(cameraId);
    if (cam) { cam.pc.close(); cam.cell?.remove(); cameras.delete(cameraId); }
    updateCameraList();
    updateGrid();
    updateCamCount();
    if (cameras.size === 0) {
      const grid = document.getElementById('camera-grid');
      grid.innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-icon">📡</div>' +
        '<h2>カメラ待機中</h2><p>以下のURLをカメラ端末のブラウザで開いてください</p>' +
        '<div class="url-box" id="camera-url" onclick="copyUrl()">---</div>' +
        '<div class="copy-hint">タップでURLをコピー</div></div>';
      showCameraUrl();
    }
  }

  function updateGrid() {
    const grid = document.getElementById('camera-grid');
    const n = cameras.size;
    grid.className = n > 0 ? 'grid-' + Math.min(n, 6) : '';
    updateCamCount();
  }

  function updateCamCount() { document.getElementById('cam-count').textContent = cameras.size; }

  function updateCameraList() {
    const list = document.getElementById('camera-list');
    if (cameras.size === 0) { list.innerHTML = '<div class="no-alert">接続なし</div>'; return; }
    list.innerHTML = '';
    cameras.forEach((cam, id) => {
      const item = document.createElement('div');
      item.className = 'cam-list-item';
      item.innerHTML = '<div class="cam-list-dot" style="background:var(--accent3)"></div><div class="cam-list-name">' + cam.name + '</div>';
      item.onclick = () => cam.cell?.scrollIntoView({ behavior: 'smooth' });
      list.appendChild(item);
    });
  }

  // アラート
  function addAlertItem(alert) {
    alertCount++;
    document.getElementById('alert-count').textContent = alertCount;
    document.getElementById('live-dot').classList.add('alert');
    setTimeout(() => document.getElementById('live-dot').classList.remove('alert'), 3000);

    const log = document.getElementById('alert-log');
    const noAlert = log.querySelector('.no-alert');
    if (noAlert) noAlert.remove();

    const item = document.createElement('div');
    item.className = 'alert-item';
    const t = new Date(alert.timestamp);
    item.innerHTML = '<div class="alert-cam">▲ ' + alert.cameraName + '</div><div class="alert-time">' + t.toLocaleTimeString('ja-JP') + '</div>';
    log.insertBefore(item, log.firstChild);

    const cam = cameras.get(alert.cameraId);
    if (cam?.cell) {
      cam.cell.classList.add('motion-alert');
      const badge = document.getElementById('motion-' + alert.cameraId);
      if (badge) badge.classList.add('show');
      setTimeout(() => {
        cam.cell.classList.remove('motion-alert');
        if (badge) badge.classList.remove('show');
      }, 5000);
    }
    if (soundEnabled) playBeep();
  }

  function playBeep() {
    try {
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function clearAlerts() {
    document.getElementById('alert-log').innerHTML = '<div class="no-alert">アラートなし</div>';
    alertCount = 0;
    document.getElementById('alert-count').textContent = 0;
    if (myId) db.ref('alerts/' + myId).remove();
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-btn').textContent = soundEnabled ? '🔔 ON' : '🔕 OFF';
  }

  function logout() {
    if (myId) db.ref('dashboard/' + myId).remove();
    localStorage.removeItem('sc_role');
    auth.signOut().then(() => { window.location.href = 'index.html'; });
  }
</script>
</body>
</html>
